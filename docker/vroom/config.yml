cliArgs:
  geometry: false
  planmode: false
  threads: 4
  explore: 5
  limit: '1mb'
  logdir: '/..'
  logsize: '100M'
  maxlocations: 1000
  maxvehicles: 200
  override: true
  path: ''
  port: 3000
  router: 'ors'
  timeout: 300000
  baseurl: '/'

routingServers:
  ors:
    driving-car:
      host: 'ors'
      port: '8082'
      baseurl: '/ors/v2'
