services:
  tileserver:
    image: klokantech/tileserver-gl
    container_name: tileserver
    ports:
      - "8083:80"
    volumes:
      - ./tileserver:/data:ro
      - ${OSM_DATA_ROOT}/mbtiles/germany.mbtiles:/data/germany.mbtiles:ro
    command: ["--config", "/data/config.json", "--no-cors"]
    restart: unless-stopped
    networks: [tiles-net]

  nominatim-nrw:
    image: mediagis/nominatim:4.5
    container_name: nominatim-nrw
    ports:
      - "7071:8080"
    volumes:
      - ${OSM_DATA_ROOT}/nominatim-data:/var/lib/postgresql/16/main
      - ${OSM_DATA_ROOT}/osm-import:/nominatim
    environment:
      POSTGRES_PASSWORD: nominatim
      NOMINATIM_PASSWORD: nominatim
      POSTGRES_DB: nominatim
      PBF_PATH: /nominatim/nrw.osm.pbf
      NOMINATIM_IMPORT: "1"
      NOMINATIM_THREADS: "4"
    shm_size: "1gb"
    restart: unless-stopped
    networks: [tiles-net]

  ors:
    image: openrouteservice/openrouteservice:v8.0.0
    container_name: ors-app
    ports:
      - "8082:8082"
    volumes:
      - ${OSM_DATA_ROOT}/ors:/home/ors
      - ./ors/ors-docker/config/ors-config.yml:/home/ors/config/ors-config.yml:ro
    environment:
      ORS_CONFIG_LOCATION: /home/ors/config/ors-config.yml
      XMS: 8g
      XMX: 12g
    depends_on:
      - nominatim-nrw
    restart: unless-stopped
    networks: [tiles-net]

  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: graphhopper
    ports:
      - "8989:8989"
    volumes:
      - ${OSM_DATA_ROOT}/graphhopper:/data
      - ./graphhopper/config.yml:/data/config.yml:ro
    environment:
      JAVA_OPTS: -Xms2g -Xmx8g
    command: ["-c", "/data/config.yml"]
    restart: unless-stopped
    networks: [tiles-net]

  vroom:
    image: vroomvrp/vroom-docker:v1.10.0
    container_name: vroom
    ports:
      - "8084:3000"
    volumes:
      - ./vroom:/conf:ro
    environment:
      VROOM_ROUTER: ors
    depends_on:
      - ors
    restart: unless-stopped
    networks: [tiles-net]

  overpass:
    image: wiktorn/overpass-api
    container_name: overpass-nrw
    ports:
      - "7072:80"
    volumes:
      - ${OSM_DATA_ROOT}/overpass-data:/db
      - ${OSM_DATA_ROOT}/osm-import:/data:ro
    environment:
      OVERPASS_META: "yes"
      OVERPASS_MODE: init
      OVERPASS_PLANET_URL: "file:///data/nrw.osm.pbf"
      OVERPASS_RULES_LOAD: 10
      OVERPASS_SPACE: 4000000000
      OVERPASS_MAX_TIMEOUT: 1000
    restart: unless-stopped
    networks: [tiles-net]

networks:
  tiles-net:
    driver: bridge
