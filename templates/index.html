<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis OSM Lab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #64748b; --accent: #38bdf8; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; margin: 0; min-height: 100vh; }
    .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .navbar-brand { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; letter-spacing: .02em; }
    .nav-link { color: var(--muted); text-decoration: none; font-size: .9rem; margin-left: 1.5rem; }
    .nav-link:hover { color: var(--text); }
    .layout { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 53px); }
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-inner { flex: 1; overflow-y: auto; padding: 1.25rem; }
    #map { width: 100%; height: 100%; }

    .section-label { font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
    .form-control, .form-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: .5rem .75rem; width: 100%; outline: none; font-size: .9rem; }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,.15); }
    .form-control::placeholder { color: var(--muted); }
    .btn-primary { background: var(--accent); color: #0f172a; border: none; border-radius: 6px; padding: .5rem 1rem; font-weight: 600; cursor: pointer; font-size: .9rem; width: 100%; }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-secondary { background: #334155; color: var(--text); border: none; border-radius: 6px; padding: .5rem 1rem; font-size: .9rem; cursor: pointer; width: 100%; }
    .btn-secondary:hover { background: #475569; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .coords-row { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; }

    .result-list { list-style: none; padding: 0; margin: 0; }
    .result-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: .65rem .85rem; margin-bottom: .5rem; cursor: pointer; transition: border-color .15s; }
    .result-item:hover { border-color: var(--accent); }
    .result-name { font-size: .875rem; font-weight: 600; color: var(--text); }
    .result-sub  { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
    .result-coords { font-size: .72rem; color: #475569; margin-top: .2rem; font-family: monospace; }

    .badge-type { font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
                  background: #0f4c75; color: #7dd3fc; border-radius: 4px; padding: .1em .45em; margin-left: .4rem; vertical-align: middle; }

    .spinner { display: none; width: 18px; height: 18px; border: 2px solid #334155; border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: auto; }
    .spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert-box { border-radius: 6px; padding: .65rem 1rem; font-size: .85rem; margin-top: .75rem; display: none; }
    .alert-box.show { display: block; }
    .alert-err { background: #450a0a; border: 1px solid #7f1d1d; color: #fca5a5; }

    .reverse-result { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: .75rem; font-size: .85rem; display: none; }
    .reverse-result.show { display: block; }
    .reverse-label { color: var(--muted); font-size: .75rem; margin-bottom: .15rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">⬡ Jarvis OSM Lab</a>
  <div>
    <a class="nav-link d-inline" href="/status">Status</a>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-inner">

      <!-- Vorwärts-Geocoding -->
      <div class="section-label">Adresssuche</div>
      <input id="searchInput" class="form-control" type="text"
             placeholder="Straße, Ort, PLZ – beliebige Kombination…" autocomplete="off">
      <div style="margin-top:.5rem; display:flex; gap:.5rem;">
        <button class="btn-primary" onclick="doSearch()" style="flex:1">Suchen</button>
      </div>

      <div class="spinner" id="searchSpinner" style="margin-top:.75rem;"></div>
      <div class="alert-box alert-err" id="searchErr"></div>

      <ul class="result-list" id="resultList" style="margin-top:.75rem;"></ul>

      <hr class="divider">

      <!-- Reverse Geocoding -->
      <div class="section-label">Koordinaten → Adresse</div>
      <div class="coords-row">
        <input id="latInput" class="form-control" type="text" placeholder="Breitengrad (Lat)" autocomplete="off">
        <input id="lonInput" class="form-control" type="text" placeholder="Längengrad (Lon)" autocomplete="off">
      </div>
      <div style="margin-top:.5rem;">
        <button class="btn-secondary" onclick="doReverse()">Rückwärtssuche</button>
      </div>

      <div class="spinner" id="revSpinner" style="margin-top:.75rem;"></div>
      <div class="alert-box alert-err" id="revErr" style="margin-top:.5rem;"></div>
      <div class="reverse-result" id="revResult">
        <div class="reverse-label">Gefundene Adresse</div>
        <div id="revName" style="font-weight:600; margin-bottom:.35rem;"></div>
        <div id="revAddr" style="color:var(--muted); font-size:.8rem;"></div>
        <div id="revCoords" style="font-family:monospace; font-size:.72rem; color:#475569; margin-top:.35rem;"></div>
      </div>

      <hr class="divider">

      <!-- Tipp -->
      <div style="font-size:.75rem; color:var(--muted); line-height:1.5;">
        Auf die Karte klicken für Rückwärtssuche.<br>
        Suchergebnis anklicken zum Anzeigen auf der Karte.
      </div>

    </div>
  </div>

  <div id="map"></div>
</div>

<script>
const TILE_URL = "{{ tileserver_url }}/styles/osm-bright/{z}/{x}/{y}.png";

const map = L.map("map").setView([51.5, 7.5], 10);

L.tileLayer(TILE_URL, {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

let marker = null;

// ── Karten-Klick → Reverse ──────────────────────────────────────────────────
map.on("click", (e) => {
  document.getElementById("latInput").value = e.latlng.lat.toFixed(6);
  document.getElementById("lonInput").value = e.latlng.lng.toFixed(6);
  doReverse();
});

// ── Vorwärts-Suche ───────────────────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doSearch();
});

function setSpinner(id, on) {
  document.getElementById(id).classList.toggle("active", on);
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add("show");
}
function clearErr(id) {
  const el = document.getElementById(id);
  el.textContent = "";
  el.classList.remove("show");
}

async function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;
  clearErr("searchErr");
  document.getElementById("resultList").innerHTML = "";
  setSpinner("searchSpinner", true);

  try {
    const res = await fetch("/api/geocode", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ query: q, limit: 10 }),
    });
    const data = await res.json();
    if (!res.ok) { showErr("searchErr", data.error || "Fehler"); return; }
    renderResults(data.results || []);
  } catch(e) {
    showErr("searchErr", "Netzwerkfehler");
  } finally {
    setSpinner("searchSpinner", false);
  }
}

function renderResults(results) {
  const ul = document.getElementById("resultList");
  ul.innerHTML = "";
  if (!results.length) {
    ul.innerHTML = '<li style="color:var(--muted);font-size:.85rem;padding:.5rem 0;">Keine Ergebnisse</li>';
    return;
  }
  results.forEach(r => {
    const li = document.createElement("li");
    li.className = "result-item";
    const name = r.display_name || "Unbekannt";
    const type = r.type || r.class || "";
    li.innerHTML = `
      <div class="result-name">${esc(name.split(",")[0])}<span class="badge-type">${esc(type)}</span></div>
      <div class="result-sub">${esc(name.split(",").slice(1).join(",").trim())}</div>
      <div class="result-coords">${parseFloat(r.lat).toFixed(6)}, ${parseFloat(r.lon).toFixed(6)}</div>
    `;
    li.addEventListener("click", () => zoomTo(parseFloat(r.lat), parseFloat(r.lon), r));
    ul.appendChild(li);
  });
}

function zoomTo(lat, lon, r) {
  map.setView([lat, lon], 16);
  if (marker) marker.remove();
  marker = L.marker([lat, lon]).addTo(map)
    .bindPopup(`<strong>${esc(r.display_name?.split(",")[0] || "")}</strong><br>${esc(r.display_name || "")}`)
    .openPopup();
}

// ── Reverse ──────────────────────────────────────────────────────────────────
async function doReverse() {
  const lat = parseFloat(document.getElementById("latInput").value);
  const lon = parseFloat(document.getElementById("lonInput").value);
  clearErr("revErr");
  document.getElementById("revResult").classList.remove("show");
  if (isNaN(lat) || isNaN(lon)) { showErr("revErr", "Ungültige Koordinaten"); return; }
  setSpinner("revSpinner", true);

  try {
    const res = await fetch("/api/reverse", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ lat, lon }),
    });
    const data = await res.json();
    if (!res.ok) { showErr("revErr", data.error || "Fehler"); return; }

    const addr = data.address || {};
    const parts = [addr.road, addr.house_number, addr.postcode, addr.city || addr.town || addr.village].filter(Boolean);
    document.getElementById("revName").textContent = data.display_name?.split(",")[0] || "–";
    document.getElementById("revAddr").textContent = parts.join(", ");
    document.getElementById("revCoords").textContent = `${parseFloat(data.lat).toFixed(6)}, ${parseFloat(data.lon).toFixed(6)}`;
    document.getElementById("revResult").classList.add("show");

    map.setView([lat, lon], 17);
    if (marker) marker.remove();
    marker = L.marker([lat, lon]).addTo(map)
      .bindPopup(`<strong>${esc(data.display_name?.split(",")[0] || "")}</strong><br>${esc(data.display_name || "")}`)
      .openPopup();
  } catch(e) {
    showErr("revErr", "Netzwerkfehler");
  } finally {
    setSpinner("revSpinner", false);
  }
}

function esc(str) {
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>

</body>
</html>
